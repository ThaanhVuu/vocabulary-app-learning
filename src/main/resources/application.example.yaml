spring:
  application:
    name: vocabulary-learning-app

  datasource:
    # Điền URL kết nối PostgreSQL của bạn vào đây (VD: NeonDB)
    url: jdbc:postgresql://<host>:<port>/<database_name>?sslmode=require
    username: <your_db_username>
    password: <your_db_password>
  jpa:
    hibernate:
      ddl-auto: update # Cân nhắc đổi thành 'validate' hoặc 'none' khi lên production
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # Spring Boot tự nhận diện PostgreSQL, dòng này có thể bỏ qua
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      # Điền thông tin kết nối Redis (VD: Redis Cloud)
      host: <your_redis_host>
      port: <your_redis_port>
      username: default
      password: <your_redis_password>

app:
  jwt:
    # Đường dẫn tới file chứa RSA keys (cần tự tạo bằng OpenSSL)
    private-key: classpath:certs/private.pem
    public-key: classpath:certs/public.pem
    issuer: "ABC"
    access-expiry: 3600
    refresh-expiry: 2592000

springdoc:
  api-docs:
    path: /v3/api-docs # Đường dẫn lấy file JSON chứa cấu trúc API
  swagger-ui:
    path: /swagger-ui.html # Đường dẫn để vào giao diện web Swagger UI
    operationsSorter: method # Tự động sắp xếp các API theo phương thức (GET, POST, PUT, DELETE) cho dễ nhìn

# ==========================================
# CẤU HÌNH THEO DÕI SỨC KHỎE (ACTUATOR)
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics # Mở các cổng: sức khỏe, thông tin app, và đo lường (CPU, RAM...)
  endpoint:
    health:
      show-details: always # BẮT BUỘC: Hiển thị chi tiết bên trong (Để biết Database có đang sống hay chết)